<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Financiamento</title>

  <!-- Descrição (aparece em busca e compartilhamento) -->
  <meta name="description" content="Calculadora de financiamento PRICE. Calcule valor financiado, parcela mensal, índice ou número de parcelas, total a pagar e juros.">

  <!-- Favicon (ícone na aba do navegador) -->
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <!-- PWA: manifest e cor da barra -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff7900">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1a1a">

  <!-- Compartilhamento (WhatsApp, Slack, etc) -->
  <meta property="og:title" content="Calculadora de Financiamento">
  <meta property="og:description" content="Calcule parcela mensal, valor financiado, índice ou prazo. Veja também total a pagar e juros.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icon-512.png">
  <meta name="twitter:card" content="summary">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f3f5f7;
      color: #222;
    }

    .container {
      max-width: 460px;
      margin: 30px auto;
      background: #fff;
      padding: 24px;
      border-radius: 20px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.12);
    }

    h1 {
      text-align: center;
      font-size: 24px;
      margin: 0 0 8px 0;
    }

    .subtitulo {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.4;
    }

    .grupo {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .campo {
      display: flex;
      align-items: center;
      border: 1px solid #ccc;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .campo:focus-within {
      border-color: #ff7900;
      box-shadow: 0 0 0 2px rgba(255,121,0,0.18);
    }

    .prefixo,
    .sufixo {
      background: #f1f1f1;
      padding: 14px 12px;
      font-weight: bold;
      color: #555;
      min-width: 42px;
      text-align: center;
    }

    input {
      width: 100%;
      border: none;
      outline: none;
      padding: 14px;
      font-size: 18px;
      background: #fff;
    }

    input.dinheiro {
      text-align: right;
    }

    input.numero {
      text-align: center;
    }

    input.auto {
      background: #fff4e8;
      color: #8a4300;
      font-weight: bold;
    }

    .botoes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 22px;
    }

    button {
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .calcular {
      background: #ff7900;
      color: white;
    }

    .limpar {
      background: #555;
      color: white;
    }

    .resultado {
      display: none;
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      background: #fff3e6;
      color: #8a4300;
      font-weight: bold;
      text-align: center;
      line-height: 1.4;
    }

    .obs {
      margin-top: 18px;
      color: #777;
      font-size: 12px;
      line-height: 1.5;
    }

    /* Botão "Instalar app" — escondido até o navegador permitir */
    .instalar {
      display: none;
      margin-top: 12px;
      width: 100%;
      padding: 12px;
      background: transparent;
      color: #ff7900;
      border: 2px solid #ff7900;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .instalar.visivel {
      display: block;
    }

    /* Modo escuro automático — segue o sistema do usuário */
    @media (prefers-color-scheme: dark) {
      body {
        background: #1a1a1a;
        color: #e8e8e8;
      }
      .container {
        background: #2a2a2a;
        box-shadow: 0 8px 28px rgba(0,0,0,0.4);
      }
      .subtitulo {
        color: #aaa;
      }
      .campo {
        border-color: #444;
        background: #333;
      }
      .prefixo,
      .sufixo {
        background: #3a3a3a;
        color: #bbb;
      }
      input {
        background: #333;
        color: #e8e8e8;
      }
      input.auto {
        background: #4a3520;
        color: #ffb066;
      }
      .resultado {
        background: #3a2a18;
        color: #ffb066;
      }
      .obs {
        color: #999;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Calculadora de Financiamento</h1>

    <div class="subtitulo">
      Preencha 3 campos e deixe vazio o campo que deseja calcular.
    </div>

    <div class="grupo">
      <label for="valorFinanciado">Valor financiado</label>
      <div class="campo">
        <span class="prefixo">R$</span>
        <input id="valorFinanciado" class="dinheiro" type="text" inputmode="decimal" placeholder="0,00">
      </div>
    </div>

    <div class="grupo">
      <label for="indice">Índice mensal</label>
      <div class="campo">
        <input id="indice" class="numero" type="text" inputmode="decimal" placeholder="1,10">
        <span class="sufixo">%</span>
      </div>
    </div>

    <div class="grupo">
      <label for="parcelas">Número de parcelas</label>
      <div class="campo">
        <input id="parcelas" class="numero" type="text" inputmode="decimal" placeholder="30">
      </div>
    </div>

    <div class="grupo">
      <label for="valorParcela">Valor da parcela</label>
      <div class="campo">
        <span class="prefixo">R$</span>
        <input id="valorParcela" class="dinheiro" type="text" inputmode="decimal" placeholder="0,00">
      </div>
    </div>

    <div id="resultado" class="resultado"></div>

    <div class="botoes">
      <button class="calcular" onclick="calcular()">Calcular</button>
      <button class="limpar" onclick="limparTudo()">Limpar</button>
    </div>

    <button id="botaoInstalar" class="instalar" onclick="instalarApp()">📱 Instalar como app</button>

    <div class="obs">
      Fórmula usada (Tabela PRICE — parcelas fixas):<br>
      <strong>Parcela = Valor financiado × Índice ÷ (1 − (1 + Índice)<sup>−Parcelas</sup>)</strong><br><br>
      Para calcular um campo, deixe ele vazio e preencha os outros 3.
    </div>
  </div>

  <script>
    let ultimoCampoCalculado = null;

    const valorFinanciado = document.getElementById("valorFinanciado");
    const indice = document.getElementById("indice");
    const parcelas = document.getElementById("parcelas");
    const valorParcela = document.getElementById("valorParcela");
    const resultado = document.getElementById("resultado");

    const campos = [valorFinanciado, indice, parcelas, valorParcela];

    campos.forEach(campo => {
      campo.addEventListener("input", () => {
        campo.classList.remove("auto");

        if (campo.id === ultimoCampoCalculado) {
          ultimoCampoCalculado = null;
        }

        if (campo.classList.contains("dinheiro")) {
          formatarDigitacaoDinheiro(campo);
        } else {
          formatarDigitacaoNumero(campo);
        }

        calcular();
      });

      campo.addEventListener("blur", () => {
        if (campo.classList.contains("dinheiro")) {
          const numero = lerDinheiro(campo.value);
          if (numero !== null) {
            campo.value = formatarMoeda(numero);
          }
        }

        if (campo.id === "indice") {
          const numero = lerNumero(campo.value);
          if (numero !== null) {
            campo.value = formatarNumero(numero, 2, 4);
          }
        }

        // Quando o usuário sai do campo, dispara o cálculo automático
        calcular();
      });
    });

    function formatarDigitacaoDinheiro(campo) {
      let valor = campo.value;

      valor = valor.replace(/[^\d,]/g, "");

      let partes = valor.split(",");
      let inteiro = partes[0].replace(/\D/g, "");
      let decimal = partes[1] ? partes[1].replace(/\D/g, "").slice(0, 2) : "";

      if (inteiro.length > 3) {
        inteiro = inteiro.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
      }

      if (valor.includes(",")) {
        campo.value = inteiro + "," + decimal;
      } else {
        campo.value = inteiro;
      }
    }

    function formatarDigitacaoNumero(campo) {
      let valor = campo.value;
      valor = valor.replace(/[^\d,]/g, "");

      let partes = valor.split(",");
      let inteiro = partes[0].replace(/\D/g, "");
      let decimal = partes[1] ? partes[1].replace(/\D/g, "").slice(0, 4) : "";

      if (valor.includes(",")) {
        campo.value = inteiro + "," + decimal;
      } else {
        campo.value = inteiro;
      }
    }

    function lerDinheiro(valor) {
      if (!valor || valor.trim() === "") return null;

      valor = valor
        .replace(/\./g, "")
        .replace(",", ".")
        .trim();

      const numero = parseFloat(valor);

      return isNaN(numero) ? null : numero;
    }

    function lerNumero(valor) {
      if (!valor || valor.trim() === "") return null;

      valor = valor
        .replace(/\./g, "")
        .replace(",", ".")
        .trim();

      const numero = parseFloat(valor);

      return isNaN(numero) ? null : numero;
    }

    function formatarMoeda(numero) {
      return numero.toLocaleString("pt-BR", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function formatarNumero(numero, min = 2, max = 4) {
      return numero.toLocaleString("pt-BR", {
        minimumFractionDigits: min,
        maximumFractionDigits: max
      });
    }

    function preencherCampo(campo, valor) {
      campo.value = valor;
      campo.classList.add("auto");
      ultimoCampoCalculado = campo.id;
    }

    function limparMarcacoes() {
      campos.forEach(campo => campo.classList.remove("auto"));
    }

    function mostrarResultado(texto) {
      resultado.innerHTML = texto;
      resultado.style.display = "block";
    }

    function esconderResultado() {
      resultado.innerHTML = "";
      resultado.style.display = "none";
    }

    // ===== Fórmulas da Tabela PRICE =====
    // PMT = VP * i / (1 - (1+i)^-n)
    // VP = PMT * (1 - (1+i)^-n) / i
    // n  = -log(1 - VP*i/PMT) / log(1+i)
    // i  = sem fórmula fechada → Newton-Raphson

    function calcParcela(vp, i, n) {
      if (i === 0) return vp / n;
      return vp * i / (1 - Math.pow(1 + i, -n));
    }

    function calcValorFinanciado(pmt, i, n) {
      if (i === 0) return pmt * n;
      return pmt * (1 - Math.pow(1 + i, -n)) / i;
    }

    function calcNumeroParcelas(vp, pmt, i) {
      if (i === 0) return vp / pmt;
      const arg = 1 - (vp * i) / pmt;
      if (arg <= 0) return null; // parcela baixa demais — financiamento não amortiza
      return -Math.log(arg) / Math.log(1 + i);
    }

    function calcIndice(vp, pmt, n) {
      // Verificações iniciais
      if (pmt * n <= vp) return null;       // sem juros possíveis (ou pmt insuficiente)
      if (pmt <= 0 || vp <= 0 || n <= 0) return null;

      // Função a zerar: f(i) = vp*i/(1-(1+i)^-n) - pmt
      const f = (i) => calcParcela(vp, i, n) - pmt;

      // Newton-Raphson com derivada numérica + bisseção de segurança
      let i = ((pmt * n) / vp - 1) / n; // chute inicial razoável
      if (i <= 0) i = 0.01;

      for (let iter = 0; iter < 200; iter++) {
        const fi = f(i);
        if (Math.abs(fi) < 1e-10) return i;

        const h = Math.max(i * 1e-6, 1e-8);
        const df = (f(i + h) - fi) / h;
        if (df === 0) break;

        let novo = i - fi / df;
        if (novo <= 0) novo = i / 2; // bisseção pra não ir pra negativo
        i = novo;
      }
      return i;
    }

    function calcular() {
      limparMarcacoes();

      const vp  = lerDinheiro(valorFinanciado.value);
      const tx  = lerNumero(indice.value);
      const n   = lerNumero(parcelas.value);
      const pmt = lerDinheiro(valorParcela.value);

      const valores = {
        valorFinanciado: vp,
        indice: tx,
        parcelas: n,
        valorParcela: pmt
      };

      const vazios = Object.keys(valores).filter(campo => valores[campo] === null);

      if (vazios.length > 1) {
        esconderResultado();
        return;
      }

      let campoParaCalcular = null;

      // Não auto-preenche o campo onde o usuário está digitando agora
      const focadoId = document.activeElement ? document.activeElement.id : null;

      if (vazios.length === 1) {
        if (vazios[0] === focadoId) {
          // Usuário está digitando neste campo, esperamos ele sair pra calcular
          esconderResultado();
          return;
        }
        campoParaCalcular = vazios[0];
      } else if (vazios.length === 0 && ultimoCampoCalculado) {
        if (ultimoCampoCalculado === focadoId) {
          // Usuário está editando o campo que tinha sido auto-calculado, respeita
          return;
        }
        campoParaCalcular = ultimoCampoCalculado;
      } else {
        mostrarResultado("Para calcular automaticamente, deixe um campo vazio.");
        return;
      }

      const taxa = tx !== null ? tx / 100 : null;

      try {
        if (campoParaCalcular === "valorParcela") {
          if (vp === null || taxa === null || n === null) return;
          if (vp <= 0 || n <= 0 || taxa < 0) {
            mostrarResultado("Valor financiado, número de parcelas e índice precisam ser válidos.");
            return;
          }

          const pmtCalc = calcParcela(vp, taxa, n);
          preencherCampo(valorParcela, formatarMoeda(pmtCalc));
          mostrarResumo(vp, pmtCalc, n, "Parcela mensal calculada");
        }

        if (campoParaCalcular === "valorFinanciado") {
          if (pmt === null || taxa === null || n === null) return;
          if (pmt <= 0 || n <= 0 || taxa < 0) {
            mostrarResultado("Parcela, número de parcelas e índice precisam ser válidos.");
            return;
          }

          const vpCalc = calcValorFinanciado(pmt, taxa, n);
          preencherCampo(valorFinanciado, formatarMoeda(vpCalc));
          mostrarResumo(vpCalc, pmt, n, "Valor financiado calculado");
        }

        if (campoParaCalcular === "parcelas") {
          if (vp === null || pmt === null || taxa === null) return;
          if (vp <= 0 || pmt <= 0 || taxa < 0) {
            mostrarResultado("Valor financiado, parcela e índice precisam ser válidos.");
            return;
          }

          const nCalc = calcNumeroParcelas(vp, pmt, taxa);
          if (nCalc === null || !isFinite(nCalc)) {
            mostrarResultado("Com essa parcela e esse índice, o financiamento não termina. Aumente a parcela.");
            return;
          }
          preencherCampo(parcelas, formatarNumero(nCalc, 2, 2));
          mostrarResumo(vp, pmt, nCalc, "Número de parcelas calculado");
        }

        if (campoParaCalcular === "indice") {
          if (vp === null || pmt === null || n === null) return;
          if (vp <= 0 || pmt <= 0 || n <= 0) {
            mostrarResultado("Valor financiado, parcela e número de parcelas precisam ser maiores que zero.");
            return;
          }

          const iCalc = calcIndice(vp, pmt, n);
          if (iCalc === null || !isFinite(iCalc)) {
            mostrarResultado("Não foi possível calcular o índice. Confira se os valores fazem sentido (total pago precisa ser maior que o valor financiado).");
            return;
          }
          const percentual = iCalc * 100;
          preencherCampo(indice, formatarNumero(percentual, 2, 4));
          mostrarResumo(vp, pmt, n, "Índice mensal calculado");
        }

      } catch (erro) {
        mostrarResultado("Não foi possível calcular. Verifique os valores informados.");
      }
    }

    // Mostra parcela + total a pagar + juros totais
    function mostrarResumo(vp, pmt, n, titulo) {
      const total = pmt * n;
      const juros = total - vp;
      mostrarResultado(
        titulo + "<br>" +
        "<span style='font-size:13px;font-weight:normal;'>" +
        "Parcela: R$ " + formatarMoeda(pmt) + "<br>" +
        "Total a pagar: R$ " + formatarMoeda(total) + "<br>" +
        "Juros totais: R$ " + formatarMoeda(juros) +
        "</span>"
      );
    }

    function limparTudo() {
      valorFinanciado.value = "";
      indice.value = "";
      parcelas.value = "";
      valorParcela.value = "";
      ultimoCampoCalculado = null;
      limparMarcacoes();
      esconderResultado();
    }
  </script>

  <!-- PWA: botão "Instalar como app" -->
  <script>
    let promptInstalar = null;
    const botaoInstalar = document.getElementById('botaoInstalar');

    // Quando o navegador permite instalar, guardamos o prompt e mostramos o botão
    window.addEventListener('beforeinstallprompt', (evento) => {
      evento.preventDefault();
      promptInstalar = evento;
      botaoInstalar.classList.add('visivel');
    });

    function instalarApp() {
      if (!promptInstalar) return;
      promptInstalar.prompt();
      promptInstalar.userChoice.then(() => {
        promptInstalar = null;
        botaoInstalar.classList.remove('visivel');
      });
    }

    // Esconde o botão depois que o app foi instalado
    window.addEventListener('appinstalled', () => {
      botaoInstalar.classList.remove('visivel');
      promptInstalar = null;
    });
  </script>

  <!-- PWA: registra o service worker para funcionar offline -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js');
      });
    }
  </script>

</body>
</html>
